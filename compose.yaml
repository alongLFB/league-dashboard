name: league-dashboard

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: league-dashboard-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 覆盖 .env 中的 DATABASE_URL，动态读取变量，并将 localhost 替换为 db 容器名
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    # 在启动前自动运行数据库同步
    command: sh -c "npx prisma db push && npm start"

  db:
    image: postgres:16-alpine # 使用最新的稳定版 postgres
    container_name: league-dashboard-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      # 读取 .env 中独立的连接变量
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
